name: Deploy Backend to VPS

# 1. WHEN SHOULD THIS RUN?
# Only when code is pushed to the 'main' branch, AND only if files inside 'city-backend' were changed.
on:
  push:
    branches:
      - main
    paths:
      - 'city-backend/**'

# 2. WHAT SHOULD IT DO?
jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Execute Deployment Script via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            # Navigate to the backend folder and run our script!
            cd /var/www/stylecity/city-backend
            ./deploy.sh